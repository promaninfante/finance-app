AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  finance-app
  Personal finance automation — AWS compute layer

# ============================================================
# Globals — applied to all Lambda functions unless overridden
# ============================================================
Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    MemorySize: 256
    Timeout: 30
    Environment:
      Variables:
        LOG_LEVEL: INFO

# ============================================================
# Parameters
# ============================================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment

# ============================================================
# Resources
# ============================================================
Resources:
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/finance/${Environment}/application"
      RetentionInDays: 30

  # ----------------------------------------------------------
  # C: Ingest — triggered by Google Apps Script Drive poller
  # ----------------------------------------------------------
  IngestStatementFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "finance-ingest-${Environment}"
      CodeUri: src/ingest/
      Handler: app.handler
      MemorySize: 1024
      Timeout: 300
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - POST
      Policies:
        - SSMParameterWithSlashPrefixReadPolicy:
            ParameterName: "finance/*"
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment

# ============================================================
# Outputs
# ============================================================
Outputs:
  Environment:
    Description: Deployment environment
    Value: !Ref Environment

  IngestFunctionUrl:
    Description: Function URL for the ingest Lambda (paste into Apps Script Properties)
    Value: !GetAtt IngestStatementFnUrl.FunctionUrl
